<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-label="autoreplacer — rewrite-on-save text rules">
  <title>autoreplacer — rewrite-on-save text rules</title>

  <defs>
    <linearGradient id="ar-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- icon: a token rewritten on save (old -> new) -->
  <g>
    <rect x="20" y="56" width="48" height="48" rx="12" fill="#cbd2dc"/>
    <rect x="31" y="76" width="26" height="8" rx="4" fill="#ffffff" opacity="0.85"/>

    <path d="M74 80 h16" stroke="#7c8595" stroke-width="6" stroke-linecap="round"/>
    <path d="M90 72 l11 8 l-11 8 z" fill="#7c8595"/>

    <rect x="108" y="56" width="48" height="48" rx="12" fill="url(#ar-g)"/>
    <rect x="119" y="76" width="26" height="8" rx="4" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="178" y="92"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="700" font-size="46" letter-spacing="-1.5"
        fill="#1a1a1a">autoreplacer</text>

  <!-- tagline -->
  <text x="180" y="118"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-style="italic" font-size="15"
        fill="#5a5a5a">rewrite-on-save text rules</text>
</svg>
